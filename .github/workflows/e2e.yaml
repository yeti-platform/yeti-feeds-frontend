name: E2E Tests

on: [pull_request]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # We use the playwright container so we don't need to install OS dependencies on every run.
    # Keep this tag in sync with the @playwright/test version in package.json —
    # the image ships the matching browser binaries.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Run Playwright tests
      run: npm run test:e2e
      env:
        HOME: /root
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
